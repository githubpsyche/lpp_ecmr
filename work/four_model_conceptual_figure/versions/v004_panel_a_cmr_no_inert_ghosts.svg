<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360" font-family="Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Panel A: CMR</title>
  <desc id="desc">CMR contains temporal context and item features. Feature-to-context and context-to-feature memory each contain a single temporal component. Emotional components and Early LPP are omitted.</desc>

  <defs>
    <marker id="v003-arrow-gray" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#525A62"/>
    </marker>
  </defs>

  <rect width="560" height="360" fill="#FFFFFF"/>

  <text x="12" y="26" fill="#202428" font-size="24" font-weight="700">A</text>
  <text x="42" y="26" fill="#202428" font-size="23" font-weight="700">CMR</text>

  <!-- Context -->
  <text x="280" y="38" text-anchor="middle" fill="#202428" font-size="17" font-weight="700">Context (C)</text>
  <rect x="120" y="47" width="320" height="84" rx="18" fill="#DCE1E6" stroke="#687079" stroke-width="1.7"/>
  <rect x="211.5" y="65" width="137" height="48" rx="12" fill="#EAF3FB" stroke="#2E78B0" stroke-width="1.7"/>
  <text x="280" y="94" text-anchor="middle" fill="#263B4C" font-size="15" font-weight="700">Temporal context</text>

  <!-- Features -->
  <text x="280" y="262" text-anchor="middle" fill="#202428" font-size="17" font-weight="700">Features (F)</text>
  <rect x="120" y="271" width="320" height="84" rx="18" fill="#DCE1E6" stroke="#687079" stroke-width="1.7"/>
  <rect x="211.5" y="289" width="137" height="48" rx="12" fill="#EAF3FB" stroke="#2E78B0" stroke-width="1.7"/>
  <text x="280" y="318" text-anchor="middle" fill="#263B4C" font-size="15" font-weight="700">Item features</text>

  <!-- Parallel memory systems: temporal only -->
  <rect x="10" y="142" width="130" height="112" rx="15" fill="#EEF1F3" stroke="#687079" stroke-width="1.7"/>
  <text x="75" y="165" text-anchor="middle" fill="#30363B" font-size="14" font-weight="700">Feature-to-context</text>
  <text x="75" y="182" text-anchor="middle" fill="#30363B" font-size="14" font-weight="700">memory (MFC)</text>
  <rect x="22" y="197" width="106" height="38" rx="9" fill="#EAF3FB" stroke="#2E78B0" stroke-width="1.6"/>
  <text x="75" y="221" text-anchor="middle" fill="#303A42" font-size="14.5" font-weight="700">Temporal</text>

  <rect x="420" y="142" width="130" height="112" rx="15" fill="#EEF1F3" stroke="#687079" stroke-width="1.7"/>
  <text x="485" y="165" text-anchor="middle" fill="#30363B" font-size="14" font-weight="700">Context-to-feature</text>
  <text x="485" y="182" text-anchor="middle" fill="#30363B" font-size="14" font-weight="700">memory (MCF)</text>
  <rect x="432" y="197" width="106" height="38" rx="9" fill="#EAF3FB" stroke="#2E78B0" stroke-width="1.6"/>
  <text x="485" y="221" text-anchor="middle" fill="#303A42" font-size="14.5" font-weight="700">Temporal</text>

  <!-- Retrieved-context cycle -->
  <polyline points="75,142 75,89 120,89" fill="none" stroke="#525A62" stroke-width="2.3" stroke-linejoin="round" marker-end="url(#v003-arrow-gray)"/>
  <polyline points="440,89 485,89 485,142" fill="none" stroke="#525A62" stroke-width="2.3" stroke-linejoin="round" marker-end="url(#v003-arrow-gray)"/>
  <polyline points="120,313 75,313 75,254" fill="none" stroke="#525A62" stroke-width="2.3" stroke-linejoin="round" marker-end="url(#v003-arrow-gray)"/>
  <polyline points="485,254 485,313 440,313" fill="none" stroke="#525A62" stroke-width="2.3" stroke-linejoin="round" marker-end="url(#v003-arrow-gray)"/>
  <text x="88" y="62" text-anchor="middle" fill="#525A62" font-size="13.5" font-weight="700">updates</text>
  <text x="88" y="78" text-anchor="middle" fill="#525A62" font-size="13.5" font-weight="700">context</text>
  <text x="478" y="334" text-anchor="middle" fill="#525A62" font-size="13.5" font-weight="700">cues</text>
  <text x="478" y="350" text-anchor="middle" fill="#525A62" font-size="13.5" font-weight="700">features</text>

</svg>
