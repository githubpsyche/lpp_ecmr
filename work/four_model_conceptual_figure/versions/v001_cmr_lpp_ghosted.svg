<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Ghosted CMR plus LPP architecture</title>
